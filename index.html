<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed Match Game</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --light-text: #ffffff;
            --correct-color: #4cd137;
            --wrong-color: #e84118;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--light-text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; /* Fix for mobile Safari address bar */
            overflow: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
        }

        .active {
            display: flex;
        }

        /* --- HOME SCREEN --- */
        #home-screen {
            background: linear-gradient(135deg, var(--bg-color), var(--panel-color));
        }

        h1 {
            font-size: 8vw;
            max-font-size: 3rem;
            color: var(--text-color);
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
            letter-spacing: 2px;
            text-align: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--light-text);
            background-color: var(--text-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .btn:hover, .btn:active {
            transform: scale(1.05);
        }

        .ai-box {
            position: absolute;
            bottom: 5%;
            background-color: var(--panel-color);
            border: 2px solid var(--accent-color);
            padding: 10px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .ai-logo {
            width: 25px;
            height: 25px;
            fill: var(--text-color);
        }

        .ai-text {
            font-weight: 600;
            font-size: 1rem;
        }

        /* --- UI CLOSE BUTTONS --- */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            line-height: 1;
            transition: color 0.2s;
        }
        
        .close-btn:hover, .close-btn:active {
            color: var(--text-color);
        }

        /* --- LEARN AI SLIDESHOW --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .carousel-container {
            position: relative;
            width: 90%;
            height: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-link-wrapper {
            display: block;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carousel-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(233, 69, 96, 0.9);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            font-size: 1.25rem;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 110;
        }

        #prev-btn { left: 5px; }
        #next-btn { right: 5px; }

        /* --- GAME SCREEN --- */
        #game-header {
            font-size: 1rem;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
        }

        #target-display {
            font-size: 2.5rem;
            color: var(--text-color);
            font-weight: 800;
            background: var(--panel-color);
            padding: 2px 20px;
            border-radius: 10px;
            border: 2px solid var(--accent-color);
            margin-bottom: 15px;
        }

        #grid {
            display: grid;
            /* Adaptive mobile columns and rows sizing */
            grid-template-columns: repeat(8, min(10vw, 45px));
            grid-template-rows: repeat(6, min(10vw, 45px));
            gap: 6px;
            background-color: var(--panel-color);
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        .cell {
            background-color: var(--accent-color);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.1s;
        }

        .cell.correct {
            background-color: var(--correct-color) !important;
            pointer-events: none;
        }

        .cell.wrong {
            background-color: var(--wrong-color) !important;
            pointer-events: none;
        }

        /* --- SCORE SCREEN & ANIMATION --- */
        #score-screen {
            background-color: rgba(26, 26, 46, 0.98);
            z-index: 10;
        }

        .score-container {
            text-align: center;
            background: var(--panel-color);
            padding: 30px 20px;
            border-radius: 20px;
            border: 2px solid var(--accent-color);
            width: 85%;
            max-width: 400px;
            z-index: 11;
        }

        #star-rating {
            font-size: 3.5rem;
            color: #f1c40f;
            margin: 15px 0;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .star-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* --- AD SCREEN --- */
        #ad-screen {
            background-color: #000;
        }

        #ad-screen .ad-link-wrapper {
            width: 85%;
            height: 70%;
        }

        #ad-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .ad-timer {
            position: absolute;
            bottom: 5%;
            font-size: 1rem;
            color: #888;
        }
    </style>
</head>
<body>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <h1>SPEED MATCH</h1>
        <button class="btn" onclick="startGame()">START NOW!</button>
        
        <div class="ai-box" onclick="openAiModal()">
            <svg class="ai-logo" viewBox="0 0 24 24">
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M9,7A2,2 0 0,1 11,9A2,2 0 0,1 9,11A2,2 0 0,1 7,9A2,2 0 0,1 9,7M15,7A2,2 0 0,1 17,9A2,2 0 0,1 15,11A2,2 0 0,1 13,9A2,2 0 0,1 15,7M7,14H17V18H7V14Z"/>
            </svg>
            <span class="ai-text">Learn AI</span>
        </div>
    </div>

    <!-- Learn AI Modal Window (Slideshow) -->
    <div id="ai-modal" class="modal">
        <span class="close-btn" onclick="closeAiModal()">&times;</span>
        <div class="carousel-container">
            <button class="carousel-btn" id="prev-btn" onclick="changeSlide(-1)">&#10094;</button>
            
            <a href="https://wa.me/94712220206?text=Give%20me%20more%20details%20about%20FREE%20AI%20Webinar" target="_blank" class="ad-link-wrapper">
                <img id="slideshow-image" class="carousel-img" src="webinar-ad1.png" alt="Learn AI Webinar" onerror="this.src='https://via.placeholder.com/600x400?text=Webinar+Ad+Placeholder'">
            </a>
            
            <button class="carousel-btn" id="next-btn" onclick="changeSlide(1)">&#10095;</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <span class="close-btn" onclick="exitGame()">&times;</span>
        <div id="game-header">FIND ALL THE NUMBERS BELOW:</div>
        <div id="target-display">0</div>
        <div id="grid"></div>
    </div>

    <!-- Score Screen -->
    <div id="score-screen" class="screen">
        <canvas id="star-canvas" class="star-canvas"></canvas>
        <div class="score-container">
            <h2>Round Complete!</h2>
            <p id="speed-result">Average Recognition Speed: 0.00s</p>
            <div id="star-rating">⭐⭐⭐</div>
            <button class="btn" onclick="showAd()">NEXT</button>
        </div>
    </div>

    <!-- Ad Screen -->
    <div id="ad-screen" class="screen">
        <a href="https://wa.me/94712220206?text=Give%20me%20more%20details%20about%20FREE%20AI%20Webinar" target="_blank" class="ad-link-wrapper">
            <img id="ad-image" src="webinar-ad1.png" alt="Webinar Advertisement" onerror="this.src='https://via.placeholder.com/600x400?text=Webinar+Ad+Placeholder'">
        </a>
        <div class="ad-timer">Next level starts in <span id="countdown">5</span>s...</div>
    </div>

    <script>
        // Game Configuration Updated to 6x8
        const ROWS = 6;
        const COLS = 8;
        const TOTAL_CELLS = ROWS * COLS;
        const MIN_TARGET_PERCENT = 0.25; 

        const adImages = ["webinar-ad1.png", "webinar-ad2.png", "webinar-ad3.png", "webinar-ad4.png"];
        let currentAdIndex = 0; 
        let levelAdIndex = 0;   

        let currentLevel = 1;
        let targetNumber = 0;
        let totalTargetsCount = 0;
        let foundTargetsCount = 0;
        let startTime = 0;
        let activeAdTimeout = null;
        let activeAdInterval = null;
        
        let canvas, ctx, stars = [];
        let animationId;

        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Learn AI Modal Carousel Logic
        function openAiModal() {
            currentAdIndex = 0;
            updateSlideshowImage();
            document.getElementById('ai-modal').classList.add('active');
        }

        function closeAiModal() {
            document.getElementById('ai-modal').classList.remove('active');
        }

        function changeSlide(direction) {
            currentAdIndex += direction;
            if (currentAdIndex >= adImages.length) {
                currentAdIndex = 0; 
            } else if (currentAdIndex < 0) {
                currentAdIndex = adImages.length - 1; 
            }
            updateSlideshowImage();
        }

        function updateSlideshowImage() {
            const imgElement = document.getElementById('slideshow-image');
            imgElement.src = adImages[currentAdIndex];
        }

        // Game Navigation and Play Logic
        function startGame() {
            changeScreen('game-screen');
            setupLevel();
        }

        function exitGame() {
            // Stops background routines and exits safely to the main menu
            cancelAnimationFrame(animationId);
            clearInterval(activeAdInterval);
            clearTimeout(activeAdTimeout);
            changeScreen('home-screen');
        }

        function setupLevel() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = ''; 
            foundTargetsCount = 0;

            targetNumber = Math.floor(Math.random() * 9) + 1; 
            document.getElementById('target-display').textContent = targetNumber;

            // Compute target counts based on the updated 48-cell block setup
            const minTargets = Math.ceil(TOTAL_CELLS * MIN_TARGET_PERCENT); // 25% of 48 = 12 minimum cells
            const actualTargetsCount = minTargets + Math.floor(Math.random() * 6); 
            totalTargetsCount = actualTargetsCount;

            let cellValues = [];
            for(let i = 0; i < actualTargetsCount; i++) {
                cellValues.push(targetNumber);
            }
            while(cellValues.length < TOTAL_CELLS) {
                let randomNum = Math.floor(Math.random() * 9) + 1;
                if(randomNum !== targetNumber) {
                    cellValues.push(randomNum);
                }
            }

            for (let i = cellValues.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cellValues[i], cellValues[j]] = [cellValues[j], cellValues[i]];
            }

            cellValues.forEach(value => {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.textContent = value;
                
                cell.addEventListener('click', function handleCellClick() {
                    cell.style.pointerEvents = 'none'; 
                    
                    if (value === targetNumber) {
                        cell.classList.add('correct');
                        foundTargetsCount++;
                        checkRoundStatus();
                    } else {
                        cell.classList.add('wrong');
                    }
                });
                gridElement.appendChild(cell);
            });

            startTime = performance.now();
        }

        function checkRoundStatus() {
            if (foundTargetsCount === totalTargetsCount) {
                let endTime = performance.now();
                let durationInSeconds = (endTime - startTime) / 1000;
                let avgSpeed = durationInSeconds / totalTargetsCount;
                displayScore(avgSpeed);
            }
        }

        function displayScore(avgSpeed) {
            changeScreen('score-screen');
            document.getElementById('speed-result').textContent = `Average Recognition Speed: ${avgSpeed.toFixed(2)}s per item`;
            
            let starsMarkup = '⭐';
            if (avgSpeed < 0.8) {
                starsMarkup = '⭐⭐⭐';
            } else if (avgSpeed < 1.5) {
                starsMarkup = '⭐⭐';
            }
            document.getElementById('star-rating').textContent = starsMarkup;

            initStarAnimation();
        }

        // Star Engine Canvas
        function initStarAnimation() {
            canvas = document.getElementById('star-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            stars = [];
            for (let i = 0; i < 30; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * -canvas.height,
                    size: Math.random() * 12 + 8,
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 360
                });
            }
            animateStars();
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f1c40f';
            let elementsStillFalling = false;

            stars.forEach(star => {
                ctx.save();
                ctx.translate(star.x, star.y);
                ctx.rotate((star.angle * Math.PI) / 180);
                
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * star.size, Math.sin((18 + i * 72) * Math.PI / 180) * star.size);
                    ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (star.size/2), Math.sin((54 + i * 72) * Math.PI / 180) * (star.size/2));
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                star.y += star.speed;
                star.angle += 1;

                if (star.y < canvas.height + 20) {
                    elementsStillFalling = true;
                }
            });

            if (elementsStillFalling) {
                animationId = requestAnimationFrame(animateStars);
            }
        }

        // Ad Transitions
        function showAd() {
            cancelAnimationFrame(animationId); 
            
            const adImgElement = document.getElementById('ad-image');
            adImgElement.src = adImages[levelAdIndex];
            levelAdIndex = (levelAdIndex + 1) % adImages.length; 

            changeScreen('ad-screen');
            
            let timeLeft = 5;
            const timerDisplay = document.getElementById('countdown');
            timerDisplay.textContent = timeLeft;

            activeAdInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(activeAdInterval);
                    nextLevel();
                }
            }, 1000);
        }

        function nextLevel() {
            currentLevel++;
            startGame();
        }

        window.addEventListener('resize', () => {
            if (canvas && document.getElementById('score-screen').classList.contains('active')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
