<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Speed Match Game</title>
    <style>
        :root {
            --bg-dark: #0a0a16;
            --panel-bg: rgba(22, 22, 46, 0.85);
            --neon-pink: #ff2a74;
            --neon-blue: #00f0ff;
            --neon-purple: #9d4edd;
            --correct-green: #39ff14;
            --wrong-red: #ff3131;
            --text-light: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
        }

        /* --- BACKGROUND CANVAS --- */
        .bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            z-index: 2;
        }

        .active {
            display: flex;
        }

        /* --- MODERN FANCY HOME SCREEN --- */
        #home-screen {
            background: radial-gradient(circle at center, #1b123a 0%, #050212 100%);
        }

        .title-container {
            text-align: center;
            margin-bottom: 3rem;
            animation: pulse 2s infinite alternate;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--neon-blue);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: 600;
        }

        .btn-play {
            padding: 18px 50px;
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(45deg, #ff007f, #7928ca);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-play:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.7);
        }

        .ai-box {
            position: absolute;
            bottom: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 28px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: background 0.3s;
        }

        .ai-box:active {
            background: rgba(0, 240, 255, 0.15);
        }

        .ai-logo {
            width: 28px;
            height: 28px;
            fill: var(--neon-blue);
            filter: drop-shadow(0 0 5px var(--neon-blue));
        }

        .ai-text {
            font-weight: 700;
            font-size: 1rem;
            color: var(--neon-blue);
            letter-spacing: 1px;
        }

        /* --- LEARN AI MODAL --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 2, 18, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-link-wrapper {
            display: block;
            width: 100%;
        }

        .carousel-img {
            width: 100%;
            height: auto;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 0 35px rgba(157, 78, 221, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 10, 22, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 16px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
            z-index: 110;
        }

        #prev-btn { left: -15px; }
        #next-btn { right: -15px; }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            cursor: pointer;
            z-index: 120;
            font-weight: bold;
        }

        /* --- MOBILE PERFECT PLAYING SCREEN --- */
        #game-screen {
            background: #060613;
            justify-content: space-between;
            padding: 30px 20px 40px 20px;
        }

        .game-top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 360px;
        }

        .game-title {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #8a8a9e;
            font-weight: 700;
        }

        .btn-close-game {
            width: 36px;
            height: 36px;
            background: #16162e;
            border: 1px solid #2a2a4e;
            border-radius: 50%;
            color: #8a8a9e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
        }

        #target-display {
            font-size: 4rem;
            color: var(--neon-blue);
            font-weight: 900;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            margin: 10px 0;
        }

        /* Responsive 8x6 Grid Engine */
        #grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 360px;
            height: 52vh; /* Locked fluid height specifically for mobile touch targets */
            background-color: var(--panel-bg);
            padding: 10px;
            border-radius: 16px;
            border: 1px solid #222244;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .cell {
            background: linear-gradient(135deg, #1f1f42 0%, #13132e 100%);
            border: 1px solid #2d2d5a;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            user-select: none;
        }

        .cell.correct {
            background: var(--correct-green) !important;
            color: #000;
            border-color: var(--correct-green);
            box-shadow: 0 0 15px var(--correct-green);
            pointer-events: none;
        }

        .cell.wrong {
            background: var(--wrong-red) !important;
            color: #fff;
            border-color: var(--wrong-red);
            box-shadow: 0 0 15px var(--wrong-red);
            pointer-events: none;
        }

        /* --- SCORE SCREEN --- */
        #score-screen {
            background-color: #050212;
        }

        .score-container {
            text-align: center;
            background: var(--panel-bg);
            padding: 35px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 340px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .score-container h2 {
            margin-top: 0;
            font-size: 1.8rem;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #speed-result {
            font-size: 1rem;
            color: #b0b0c6;
            line-height: 1.4;
        }

        #star-rating {
            font-size: 3.5rem;
            color: #f1c40f;
            margin: 15px 0;
            filter: drop-shadow(0 0 10px rgba(241, 196, 15, 0.6));
        }

        /* --- AD SCREEN --- */
        #ad-screen {
            background-color: #000;
        }

        #ad-image {
            width: 100%;
            max-width: 360px;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .ad-timer {
            position: absolute;
            bottom: 40px;
            font-size: 1rem;
            color: #6c6c84;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <!-- Space Engine Canvas for Home Screen Background -->
    <canvas id="space-canvas" class="bg-canvas"></canvas>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <div class="title-container">
            <h1>Speed Match</h1>
            <div class="subtitle">Mind Trainer</div>
        </div>
        
        <button class="btn-play" onclick="startGame()">Start Now!</button>
        
        <div class="ai-box" onclick="openAiModal()">
            <svg class="ai-logo" viewBox="0 0 24 24">
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M9,7A2,2 0 0,1 11,9A2,2 0 0,1 9,11A2,2 0 0,1 7,9A2,2 0 0,1 9,7M15,7A2,2 0 0,1 17,9A2,2 0 0,1 15,11A2,2 0 0,1 13,9A2,2 0 0,1 15,7M7,14H17V18H7V14Z"/>
            </svg>
            <span class="ai-text">Learn AI</span>
        </div>
    </div>

    <!-- Learn AI Modal Window (Slideshow) -->
    <div id="ai-modal" class="modal">
        <span class="close-btn" onclick="closeAiModal()">&times;</span>
        <div class="carousel-container">
            <button class="carousel-btn" id="prev-btn" onclick="changeSlide(-1)">&#10094;</button>
            <a href="https://wa.me/94712220206?text=Give%20me%20more%20details%20about%20FREE%20AI%20Webinar" target="_blank" class="ad-link-wrapper">
                <img id="slideshow-image" class="carousel-img" src="webinar-ad1.png" alt="Learn AI Webinar" onerror="this.src='https://via.placeholder.com/600x400?text=Webinar+Ad+Placeholder'">
            </a>
            <button class="carousel-btn" id="next-btn" onclick="changeSlide(1)">&#10095;</button>
        </div>
    </div>

    <!-- Game Screen (8x6 Grid Matrix Layout) -->
    <div id="game-screen" class="screen">
        <div class="game-top-bar">
            <span class="game-title">MATCH TARGET</span>
            <div class="btn-close-game" onclick="quitToHome()">&times;</div>
        </div>
        <div id="target-display">0</div>
        <div id="grid"></div>
        <div style="height: 10px;"></div> <!-- visual spacer anchor -->
    </div>

    <!-- Score Screen -->
    <div id="score-screen" class="screen">
        <canvas id="star-canvas" class="star-canvas bg-canvas"></canvas>
        <div class="score-container">
            <h2>Round Cleared!</h2>
            <p id="speed-result">Average Recognition Speed:<br><strong>0.00s</strong> per item</p>
            <div id="star-rating">⭐⭐⭐</div>
            <button class="btn-play" style="padding: 12px 40px; font-size: 1.1rem;" onclick="showAd()">Next</button>
        </div>
    </div>

    <!-- Ad Screen -->
    <div id="ad-screen" class="screen">
        <a href="https://wa.me/94712220206?text=Give%20me%20more%20details%20about%20FREE%20AI%20Webinar" target="_blank" class="ad-link-wrapper" style="text-align: center;">
            <img id="ad-image" src="webinar-ad1.png" alt="Webinar Advertisement" onerror="this.src='https://via.placeholder.com/600x400?text=Webinar+Ad+Placeholder'">
        </a>
        <div class="ad-timer">Next round loads in <span id="countdown">5</span>s...</div>
    </div>

    <script>
        // Game Matrix Configuration Adjusted to 8x6 (48 Total Cells)
        const ROWS = 8;
        const COLS = 6;
        const TOTAL_CELLS = ROWS * COLS;
        const MIN_TARGET_PERCENT = 0.25; 

        const adImages = ["webinar-ad1.png", "webinar-ad2.png", "webinar-ad3.png", "webinar-ad4.png"];
        let currentAdIndex = 0; 
        let levelAdIndex = 0;   

        let targetNumber = 0;
        let totalTargetsCount = 0;
        let foundTargetsCount = 0;
        let startTime = 0;
        
        // Background System Variables
        let spaceCanvas, spaceCtx, spaceAnimationId;
        let starCanvas, starCtx, starAnimationId;
        let elements = [];

        // Run space engine on initial load
        window.addEventListener('DOMContentLoaded', () => {
            initSpaceBackground();
        });

        // Navigation Controllers
        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            // Manage rendering lifecycles of background loop contexts 
            cancelAnimationFrame(spaceAnimationId);
            cancelAnimationFrame(starAnimationId);

            if (screenId === 'home-screen') {
                initSpaceBackground();
            }
        }

        function quitToHome() {
            if(confirm("Quit current run and return to home menu?")) {
                changeScreen('home-screen');
            }
        }

        /* --- HOME SCREEN ANIMATION ENGINE (STARS & COMETS) --- */
        function initSpaceBackground() {
            spaceCanvas = document.getElementById('space-canvas');
            spaceCtx = spaceCanvas.getContext('2d');
            resizeCanvas(spaceCanvas);

            elements = [];
            // Generate Ambient Stars
            for(let i = 0; i < 60; i++) {
                elements.push({
                    type: 'star',
                    x: Math.random() * spaceCanvas.width,
                    y: Math.random() * spaceCanvas.height,
                    size: Math.random() * 2,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }
            // Generate Dynamic Comets
            for(let i = 0; i < 3; i++) {
                generateComet();
            }
            animateSpace();
        }

        function generateComet() {
            elements.push({
                type: 'comet',
                x: Math.random() * spaceCanvas.width * 0.8,
                y: Math.random() * -spaceCanvas.height * 0.5,
                length: Math.random() * 80 + 40,
                speedX: Math.random() * 4 + 3,
                speedY: Math.random() * 4 + 3,
                size: Math.random() * 2 + 1
            });
        }

        function animateSpace() {
            spaceCtx.clearRect(0, 0, spaceCanvas.width, spaceCanvas.height);
            
            elements.forEach((el, index) => {
                if (el.type === 'star') {
                    // Twinkle mapping
                    el.alpha += el.speed;
                    if(el.alpha > 1 || el.alpha < 0) el.speed = -el.speed;
                    spaceCtx.fillStyle = `rgba(255, 255, 255, ${Math.abs(el.alpha)})`;
                    spaceCtx.fillRect(el.x, el.y, el.size, el.size);
                } 
                else if (el.type === 'comet') {
                    // Render falling comets with glowing gradient tails
                    let gradient = spaceCtx.createLinearGradient(el.x, el.y, el.x - el.length, el.y - el.length);
                    gradient.addColorStop(0, 'rgba(0, 240, 255, 1)');
                    gradient.addColorStop(0.1, 'rgba(255, 42, 116, 0.6)');
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    
                    spaceCtx.strokeStyle = gradient;
                    spaceCtx.lineWidth = el.size;
                    spaceCtx.beginPath();
                    spaceCtx.moveTo(el.x, el.y);
                    spaceCtx.lineTo(el.x - el.length, el.y - el.length);
                    spaceCtx.stroke();

                    // Physics update
                    el.x += el.speedX;
                    el.y += el.speedY;

                    // Recycle if bounds exceeded
                    if (el.y > spaceCanvas.height || el.x > spaceCanvas.width) {
                        elements.splice(index, 1);
                        generateComet();
                    }
                }
            });
            spaceAnimationId = requestAnimationFrame(animateSpace);
        }

        /* --- CAROUSEL SLIDESHOW MODAL --- */
        function openAiModal() {
            currentAdIndex = 0;
            updateSlideshowImage();
            document.getElementById('ai-modal').classList.add('active');
        }

        function closeAiModal() {
            document.getElementById('ai-modal').classList.remove('active');
        }

        function changeSlide(direction) {
            currentAdIndex += direction;
            if (currentAdIndex >= adImages.length) currentAdIndex = 0;
            else if (currentAdIndex < 0) currentAdIndex = adImages.length - 1;
            updateSlideshowImage();
        }

        function updateSlideshowImage() {
            document.getElementById('slideshow-image').src = adImages[currentAdIndex];
        }

        /* --- ACTIVE GAME PLAY ENGINE --- */
        function startGame() {
            changeScreen('game-screen');
            setupLevel();
        }

        function setupLevel() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = ''; 
            foundTargetsCount = 0;

            targetNumber = Math.floor(Math.random() * 9) + 1; 
            document.getElementById('target-display').textContent = targetNumber;

            const minTargets = Math.ceil(TOTAL_CELLS * MIN_TARGET_PERCENT); // 25% of 48 = 12 cells min
            const actualTargetsCount = minTargets + Math.floor(Math.random() * 6); 
            totalTargetsCount = actualTargetsCount;

            let cellValues = [];
            for(let i = 0; i < actualTargetsCount; i++) {
                cellValues.push(targetNumber);
            }
            while(cellValues.length < TOTAL_CELLS) {
                let randomNum = Math.floor(Math.random() * 9) + 1;
                if(randomNum !== targetNumber) {
                    cellValues.push(randomNum);
                }
            }

            // Shuffle Matrix Values
            for (let i = cellValues.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cellValues[i], cellValues[j]] = [cellValues[j], cellValues[i]];
            }

            // Generate DOM Node Elements
            cellValues.forEach(value => {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.textContent = value;
                
                cell.addEventListener('click', function handleCellClick() {
                    cell.style.pointerEvents = 'none'; // Lock out further interaction immediately
                    
                    if (value === targetNumber) {
                        cell.classList.add('correct');
                        foundTargetsCount++;
                        checkRoundStatus();
                    } else {
                        cell.classList.add('wrong');
                    }
                });
                gridElement.appendChild(cell);
            });

            startTime = performance.now();
        }

        function checkRoundStatus() {
            if (foundTargetsCount === totalTargetsCount) {
                let endTime = performance.now();
                let durationInSeconds = (endTime - startTime) / 1000;
                let avgSpeed = durationInSeconds / totalTargetsCount;
                displayScore(avgSpeed);
            }
        }

        function displayScore(avgSpeed) {
            changeScreen('score-screen');
            document.getElementById('speed-result').innerHTML = `Average Recognition Speed:<br><strong>${avgSpeed.toFixed(2)}s</strong> per item`;
            
            let starsMarkup = '⭐';
            if (avgSpeed < 0.9) starsMarkup = '⭐⭐⭐';
            else if (avgSpeed < 1.6) starsMarkup = '⭐⭐';
            
            document.getElementById('star-rating').textContent = starsMarkup;
            initStarFallAnimation();
        }

        /* --- SCORE STAGE CELEBRATION FALLING STARS ENGINE --- */
        function initStarFallAnimation() {
            starCanvas = document.getElementById('star-canvas');
            starCtx = starCanvas.getContext('2d');
            resizeCanvas(starCanvas);

            elements = [];
            for (let i = 0; i < 35; i++) {
                elements.push({
                    x: Math.random() * starCanvas.width,
                    y: Math.random() * -starCanvas.height,
                    size: Math.random() * 12 + 10,
                    speed: Math.random() * 4 + 2,
                    angle: Math.random() * 360
                });
            }
            animateFallingStars();
        }

        function animateFallingStars() {
            starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            starCtx.fillStyle = '#f1c40f';
            let activeAnimationTracks = false;

            elements.forEach(star => {
                starCtx.save();
                starCtx.translate(star.x, star.y);
                starCtx.rotate((star.angle * Math.PI) / 180);
                
                starCtx.beginPath();
                for (let i = 0; i < 5; i++) {
                    starCtx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * star.size, Math.sin((18 + i * 72) * Math.PI / 180) * star.size);
                    starCtx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (star.size/2), Math.sin((54 + i * 72) * Math.PI / 180) * (star.size/2));
                }
                starCtx.closePath();
                starCtx.fill();
                starCtx.restore();

                star.y += star.speed;
                star.angle += 1.5;

                if (star.y < starCanvas.height + 20) activeAnimationTracks = true;
            });

            if (activeAnimationTracks) {
                starAnimationId = requestAnimationFrame(animateFallingStars);
            }
        }

        /* --- ADVERTISING BREAK PROCESSOR --- */
        function showAd() {
            const adImgElement = document.getElementById('ad-image');
            adImgElement.src = adImages[levelAdIndex];
            
            levelAdIndex = (levelAdIndex + 1) % adImages.length; 

            changeScreen('ad-screen');
            
            let timeLeft = 5;
            const timerDisplay = document.getElementById('countdown');
            timerDisplay.textContent = timeLeft;

            const interval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    startGame(); // directly resets loop state variables inside setupLevel execution
                }
            }, 1000);
        }

        function resizeCanvas(canvasTarget) {
            canvasTarget.width = window.innerWidth;
            canvasTarget.height = window.innerHeight;
        }

        window.addEventListener('resize', () => {
            let activeScreen = document.querySelector('.screen.active');
            if (activeScreen && activeScreen.id === 'home-screen' && spaceCanvas) {
                resizeCanvas(spaceCanvas);
            } else if (activeScreen && activeScreen.id === 'score-screen' && starCanvas) {
                resizeCanvas(starCanvas);
            }
        });
    </script>
</body>
</html>
